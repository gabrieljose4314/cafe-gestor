</head>

<body>
    <header>
        <nav>
            <h1>Painel de Gestão de Colheita</h1>
            <hr>
            <h2 class="titulo">Gerenciamento de Colheita</h2>
        </nav>
    </header>

    <section class="menu">
        <details>
            <summary>
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor"
                    class="bi bi-list" viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5" />
                </svg>
            </summary>
            <ul>
                <li><a href="index.html">Painel de Gestão</a></li>

    <section>
        <h3>Gerenciamento de Colheita</h3>
        <form id="gerenciamento-colheita-form">
            <label for="moita-colheita">Moita:</label>
            <select id="moita-colheita" name="moita-colheita" required>
                <option value="">Selecione uma moita</option>
            </select><br><br>

            <label for="data-colheita">Data da Colheita:</label>
            <input type="date" id="data-colheita" name="data-colheita" required><br><br>

            <label for="quantidade-colhida">Quantidade Colhida (kg):</label>
            <input type="number" id="quantidade-colhida" name="quantidade-colhida" step="0.01" required><br><br>

            <button type="submit">Registrar Colheita</button>
        </form>
    </section>
</body>
