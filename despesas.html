    <section>
        <h3>Gerenciamento de Despesas</h3>
        <form id="gerenciamento-despesas-form">
            <h3>Categoria da Despesa</h3>

            <input type="radio" id="categoria-fertilizante" name="categoria-despesa" value="Fertilizante" required>
            <label for="categoria-fertilizante">Fertilizantes</label><br>

            <input type="radio" id="categoria-defensivo" name="categoria-despesa" value="Defensivo">
            <label for="categoria-defensivo">Defensivo</label><br>
        
            <input type="radio" id="categoria-herbicidas" name="categoria-despesa" value="Herbicidas">
            <label for="categoria-herbicidas">Herbicidas</label><br>

            <input type="radio" id="categoria-mao-de-obra" name="categoria-despesa" value="Mão de Obra">
            <label for="categoria-mao-de-obra">Mão de Obra</label><br>

            <input type="radio" id="categoria-outros" name="categoria-despesa" value="Outros">
            <label for="categoria-outros">Outros</label><br><br>

            <div>
            <label for="descricao-despesa">Descrição:</label><br>
            <input type="text" id="descricao-despesa" name="descricao-despesa"><br><br>
            </div>

            <label for="valor-despesa">Valor:</label>
            <input type="number" id="valor-despesa" name="valor-despesa" step="0.01" required><br><br>

            <label for="data-despesa">Data da Despesa:</label>
            <input type="date" id="data-despesa" name="data-despesa" required><br><br>

            <button type="submit">Cadastrar Despesa</button>
        </form>
    </section>
