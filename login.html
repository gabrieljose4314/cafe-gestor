<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="./img/logo-192.png">
<link rel="apple-touch-icon" href="./img/logo-192.png">
<meta name="theme-color" content="#2d4a2b">
  <title>Login - Painel de Gestão de Café</title>

  <link rel="stylesheet" href="style.css">
  <script type="module" src="auth.js" defer></script>
</head>
<body>
  <main class="pagina-login">
    <section class="login-container">
      <img class="banner" src="./img/imagem-de-fundo.png" alt="Lavoura de café">

      <div class="overlay-login">
        <h2>Bem-vindo! Se você já adquiriu o sistema, entre com sua conta.</h2>
        <button id="login-btn">Entrar com Google</button>
      </div>
    </section>

    <section class="suporte-container">
      <h3 class="txt-suporte">Dúvidas ou interesse em adquirir?</h3>
      <p>Entre em contato pelo WhatsApp para suporte ou mais informações.</p>
      <a href="https://wa.me/5531989709339" target="_blank">
        <button id="whatsapp-btn">Suporte WhatsApp</button>
      </a>
    </section>
  </main>
</body>
</html>
