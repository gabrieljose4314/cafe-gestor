<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="./img/logo-192.png">
<link rel="apple-touch-icon" href="./img/logo-192.png">
<meta name="theme-color" content="#2d4a2b">
    <title>Cadastro de Moita</title>

    <link rel="stylesheet" href="style.css">
    <script type="module" src="cadastro.js"></script>
</head>
<body>
    <header>
        <nav>
            <h1>Painel de Gestão de Café</h1>
            <hr>
            <h2 class="titulo">Cadastro de Moita</h2>
        </nav>
    </header>

    <section class="menu">
        <details>
            <summary>☰ Menu</summary>
            <ul>
                <li><a href="index.html">Painel de Gestão</a></li>
                <li><a href="producao.html">Produção por Moita</a></li>
                <li><a href="despesas.html">Gerenciamento de Despesas</a></li>
                <li><a href="companheiros.html">Gerenciamento de Companheiros</a></li>
                <li><a href="colheita.html">Gerenciamento de Colheita</a></li>
                <li><a href="vendas.html">Gerenciamento de Vendas</a></li>
                <li><a href="historico.html">Histórico de Movimentações</a></li>
            </ul>
        </details>
    </section>

    <section>
        <h3>Cadastro de Moita</h3>
        <form id="cadastro-moita-form">
            <label for="nome-moita">Nome da Moita:</label>
            <input type="text" id="nome-moita" name="nome-moita" required><br><br>

            <label for="area-moita">Área (hectares):</label>
            <input type="number" id="area-moita" name="area-moita" step="0.01" required><br><br>

            <label for="quantidade-de-pes">Quantidade de Pés:</label>
            <input type="number" id="quantidade-de-pes" name="quantidade-de-pes" required><br><br>

            <label for="tipo-de-cafe">Tipo de Café:</label>
            <input type="text" id="tipo-de-cafe" name="tipo-de-cafe"><br><br>

            <button type="submit" id="btn-salvar-moita">Cadastrar Moita</button>
        </form>
    </section>

    <section>
        <h3>Moitas Cadastradas</h3>
        <div id="lista-moitas"></div>
    </section>
</body>
</html>
